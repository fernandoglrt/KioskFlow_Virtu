<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Gravataí</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #009c3b 0%, #006a28 100%); font-family: 'Segoe UI', sans-serif; min-height: 100vh; color: #333; }
        .kiosk-card { background: white; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); padding: 30px; margin-bottom: 40px; }
        .kiosk-opt input { display: none; }
        .kiosk-opt label { display: flex; align-items: center; background: #fff; border: 2px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; font-size: 1.1rem; min-height: 60px; }
        .kiosk-opt input:checked + label { border-color: #009c3b; background: #e8f5e9; color: #009c3b; font-weight: bold; transform: scale(1.02); }
        .btn-kiosk { background: #ffdf00; color: #002776; font-weight: 800; border-radius: 50px; padding: 15px; font-size: 1.5rem; text-transform: uppercase; width: 100%; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .question-title { color: #002776; font-weight: 700; margin-bottom: 15px; font-size: 1.3rem; margin-top: 30px; border-bottom: 2px solid #ffdf00; padding-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container py-4">{% block content %}{% endblock %}</div>
</body>
</html>
